<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Apple 產品資料庫</title>
  <style>
    /* ── Theme Variables ── */
    :root {
      --bg:        #ffffff;
      --bg2:       #f5f5f7;
      --card:      #ffffff;
      --text:      #1d1d1f;
      --sub:       #6e6e73;
      --accent:    #0071e3;
      --accentH:   #0077ed;
      --border:    #d2d2d7;
      --navbg:     rgba(255,255,255,0.88);
      --shadow:    rgba(0,0,0,0.08);
      --tag:       #e8e8ed;
      --hl:        #e8f2ff;
    }
    [data-theme="dark"] {
      --bg:        #000000;
      --bg2:       #1c1c1e;
      --card:      #2c2c2e;
      --text:      #f5f5f7;
      --sub:       #98989d;
      --accent:    #2997ff;
      --accentH:   #5aadff;
      --border:    #3a3a3c;
      --navbg:     rgba(0,0,0,0.88);
      --shadow:    rgba(0,0,0,0.5);
      --tag:       #3a3a3c;
      --hl:        #0a1f38;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      min-height: 100vh;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    /* ── Top Header ── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--navbg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
    }
    .hd-logo { display: flex; align-items: center; gap: 9px; }
    .hd-logo svg { width: 20px; height: 20px; fill: var(--text); }
    .hd-title { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
    .theme-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 13px; color: var(--text); cursor: pointer;
      transition: background .2s;
    }

    /* ── Bottom Nav ── */
    .bnav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--navbg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bnav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 0; cursor: pointer;
      color: var(--sub); font-size: 10px; font-weight: 500;
      transition: color .2s;
    }
    .bnav-item .ni { font-size: 22px; line-height: 1; }
    .bnav-item.active { color: var(--accent); }

    /* ── Main Layout ── */
    main { max-width: 720px; margin: 0 auto; padding: 16px; }
    .section { display: none; }
    .section.active { display: block; }
    .sec-title { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 18px; }

    /* ── Search Bar ── */
    .sbar { position: relative; margin-bottom: 14px; }
    .sbar input {
      width: 100%; padding: 12px 16px 12px 42px;
      border-radius: 13px; border: 1px solid var(--border);
      background: var(--bg2); color: var(--text); font-size: 15px; outline: none;
      transition: border-color .2s;
    }
    .sbar input:focus { border-color: var(--accent); }
    .sbar .si { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }

    /* ── Category Chips ── */
    .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 7px 16px;
      border-radius: 20px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all .2s;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Product Grid ── */
    .pgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pcard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 14px; cursor: pointer;
      box-shadow: 0 2px 10px var(--shadow);
      transition: transform .18s, box-shadow .18s;
    }
    .pcard:hover { transform: translateY(-2px); box-shadow: 0 6px 18px var(--shadow); }
    .pcard:active { transform: scale(.97); }
    .pc-emoji { font-size: 40px; margin-bottom: 10px; }
    .pc-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .pc-tag { font-size: 11px; color: var(--sub); line-height: 1.5; }
    .pc-price { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 6px; }

    /* ── Product Detail ── */
    .pdetail { display: none; }
    .pdetail.active { display: block; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--accent); font-size: 15px; font-weight: 500;
      cursor: pointer; margin-bottom: 18px;
    }
    .hero {
      background: linear-gradient(145deg, var(--bg2), var(--card));
      border: 1px solid var(--border);
      border-radius: 22px; padding: 28px 22px; text-align: center; margin-bottom: 18px;
    }
    .hero-em { font-size: 76px; margin-bottom: 10px; }
    .hero-name { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }
    .hero-price { font-size: 22px; font-weight: 700; color: var(--accent); margin: 6px 0; }
    .hero-desc { font-size: 14px; color: var(--sub); line-height: 1.65; max-width: 480px; margin: 0 auto; }

    /* ── Accordion ── */
    .acc { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 10px; }
    .acc-hd {
      padding: 15px 16px; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; background: var(--card); font-size: 15px; font-weight: 600;
      transition: background .2s; user-select: none;
    }
    .acc-hd:active { background: var(--bg2); }
    .arr { transition: transform .3s; color: var(--sub); font-size: 13px; }
    .acc.open .arr { transform: rotate(180deg); }
    .acc-body {
      display: none; padding: 14px 16px;
      background: var(--bg2); border-top: 1px solid var(--border);
      font-size: 14px; line-height: 1.7; color: var(--sub);
    }
    .acc.open .acc-body { display: block; }

    /* ── Feature Tags ── */
    .ftags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .ftag {
      background: var(--tag); color: var(--text);
      padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }

    /* ── Specs Table ── */
    .stbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stbl tr { border-bottom: 1px solid var(--border); }
    .stbl tr:last-child { border-bottom: none; }
    .stbl td { padding: 10px 4px; vertical-align: top; }
    .stbl td:first-child { color: var(--sub); width: 42%; font-weight: 500; }

    /* ── Feature Section ── */
    .feat-hd-wrap > div:first-child { font-size: 16px; font-weight: 700; }
    .feat-sub { font-size: 11px; font-weight: 400; color: var(--sub); margin-top: 2px; }
    .feat-item { margin-bottom: 10px; }
    .feat-item-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .feat-item-desc { font-size: 12px; color: var(--sub); line-height: 1.6; }
    .dev-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .dbadge {
      background: var(--card); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 8px; font-size: 11px; color: var(--sub);
    }

    /* ── Trouble Section ── */
    .tcat-label {
      display: flex; align-items: center; gap: 8px;
      background: var(--hl); color: var(--accent);
      padding: 7px 13px; border-radius: 9px; font-size: 13px; font-weight: 600;
      margin-bottom: 8px;
    }
    .steps { list-style: none; counter-reset: sc; }
    .steps li {
      counter-increment: sc; display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 9px; font-size: 13px; line-height: 1.65;
    }
    .steps li::before {
      content: counter(sc);
      background: var(--accent); color: #fff;
      min-width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }

    /* ── Compare Section ── */
    .cbox {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
    }
    .cbox-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .cchips { display: flex; flex-wrap: wrap; gap: 8px; }
    .cchip {
      background: var(--tag); border: 2px solid transparent;
      border-radius: 20px; padding: 7px 15px; font-size: 13px;
      cursor: pointer; transition: all .2s; color: var(--text);
    }
    .cchip.selected { border-color: var(--accent); background: var(--hl); color: var(--accent); font-weight: 600; }
    .cmp-btn {
      width: 100%; margin-top: 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 13px; padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .cmp-btn:hover { background: var(--accentH); }
    .cmp-btn:disabled { background: var(--border); color: var(--sub); cursor: default; }

    /* ── Compare Table ── */
    .cresult { display: none; margin-bottom: 20px; }
    .cresult.show { display: block; }
    .ctbl-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); }
    .ctbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ctbl th {
      background: var(--bg2); padding: 12px 9px; text-align: center;
      font-weight: 700; border-bottom: 2px solid var(--border); font-size: 13px;
    }
    .ctbl th:first-child { text-align: left; }
    .ctbl td { padding: 10px 9px; border-bottom: 1px solid var(--border); vertical-align: top; text-align: center; line-height: 1.5; }
    .ctbl td:first-child { text-align: left; font-weight: 600; background: var(--bg2); color: var(--sub); font-size: 12px; }
    .ctbl tr:last-child td { border-bottom: none; }
    .ctbl-em { font-size: 22px; display: block; margin-bottom: 4px; }

    /* ── No-results ── */
    .nores { text-align: center; color: var(--sub); padding: 40px 0; font-size: 14px; }

    /* ── Add-to-compare CTA ── */
    .atc-wrap { text-align: center; margin-top: 18px; padding: 14px; background: var(--bg2); border-radius: 14px; }
    .atc-hint { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
    .atc-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 11px 26px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .atc-btn:hover { background: var(--accentH); }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .pgrid { grid-template-columns: 1fr; }
    }
  </style>
</head>

</header>

<!-- ─────────── MAIN ─────────── -->
<main>

  <!-- ① 產品介紹 -->
  <div class="section active" id="s-products">
    <div id="pl-wrap">
      <h1 class="sec-title">產品介紹</h1>
      <div class="sbar"><span class="si">🔍</span><input type="text" id="psearch" placeholder="搜尋產品…" oninput="filterP()"></div>

        <div class="chip active" onclick="setPcat('all',this)">全部</div>
        <div class="chip" onclick="setPcat('iPhone',this)">iPhone</div>
        <div class="chip" onclick="setPcat('iPad',this)">iPad</div>
        <div class="chip" onclick="setPcat('Mac',this)">Mac</div>
        <div class="chip" onclick="setPcat('Watch',this)">Watch</div>
        <div class="chip" onclick="setPcat('Audio',this)">Audio</div>
        <div class="chip" onclick="setPcat('TV',this)">TV &amp; Home</div>
      </div>
      <div class="pgrid" id="pgrid"></div>
    </div>
    <div class="pdetail" id="pdetail">
      <div class="back-btn" onclick="backToList()">‹ 返回產品列表</div>
      <div id="pdetail-body"></div>
    </div>
  </div>

  <!-- ② 功能說明 -->
  <div class="section" id="s-features">
    <h1 class="sec-title">功能說明</h1>
    <div class="chips" id="fcats">
      <div class="chip active" onclick="setFcat('all',this)">全部功能</div>
      <div class="chip" onclick="setFcat('ai',this)">AI 智慧</div>
      <div class="chip" onclick="setFcat('camera',this)">相機</div>
      <div class="chip" onclick="setFcat('chip',this)">晶片</div>
      <div class="chip" onclick="setFcat('connect',this)">連線</div>
      <div class="chip" onclick="setFcat('health',this)">健康</div>
    </div>
    <div id="feat-body"></div>
  </div>

  <!-- ③ 故障排除 -->
  <div class="section" id="s-trouble">
    <h1 class="sec-title">故障排除</h1>
    <div class="sbar"><span class="si">🔍</span><input type="text" id="tsearch" placeholder="搜尋問題或裝置…" oninput="filterT()"></div>
    <div id="trouble-body"></div>
  </div>

  <!-- ④ 規格比較 -->
  <div class="section" id="s-specs">
    <h1 class="sec-title">規格比較</h1>
    <div class="cbox">
      <div class="cbox-title">📊 選擇 2–3 個產品進行比較</div>
      <div class="cchips" id="cchips"></div>
      <button class="cmp-btn" id="cmp-btn" onclick="runCompare()" disabled>請先選擇產品</button>
    </div>
    <div class="cresult" id="cresult"><div id="ctbl-body"></div></div>
    <div id="specs-all"></div>
  </div>

</main>

<!-- ─────────── BOTTOM NAV ─────────── -->
<nav class="bnav">
  <div class="bnav-item active" onclick="gotoSec('products',this)"><span class="ni">📱</span>產品</div>
  <div class="bnav-item"       onclick="gotoSec('features',this)"><span class="ni">⚡</span>功能</div>

  <div class="bnav-item"       onclick="gotoSec('specs',this)"><span class="ni">📊</span>規格</div>
</nav>

/* ===================== STATE ===================== */
let isDark = false;
let pCat = 'all';
let fCat = 'all';
let selProds = [];

/* ===================== THEME ===================== */
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  document.getElementById('ticon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('ttxt').textContent  = isDark ? '淺色' : '深色';
}

/* ===================== NAV ===================== */
function gotoSec(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('s-' + name).classList.add('active');
  el.classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'features') renderFeats();
  if (name === 'trouble')  renderTrouble();
  if (name === 'specs')    renderCompareUI();
}

/* ===================== PRODUCTS ===================== */
function renderProds(q = '') {
  const grid = document.getElementById('pgrid');
  const q2 = q.toLowerCase();
  const list = PRODUCTS.filter(p =>
    (pCat === 'all' || p.cat === pCat) &&
    (!q2 || p.name.toLowerCase().includes(q2) || p.desc.toLowerCase().includes(q2))
  );
  if (!list.length) { grid.innerHTML = '<p class="nores" style="grid-column:1/-1">找不到相關產品 😕</p>'; return; }
  grid.innerHTML = list.map(p =>
    `<div class="pcard" onclick="showProd('${p.id}')">
      <div class="pc-emoji">${p.emoji}</div>
      <div class="pc-name">${p.name}</div>
      <div class="pc-tag">${p.tagline}</div>
      <div class="pc-price">${p.price}</div>
    </div>`
  ).join('');
}

function setPcat(c, el) {
  pCat = c;
  document.querySelectorAll('#pcats .chip').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderProds(document.getElementById('psearch').value);
}
function filterP() { renderProds(document.getElementById('psearch').value); }

function showProd(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('pl-wrap').style.display = 'none';
  const det = document.getElementById('pdetail');
  det.classList.add('active');
  const specRows = Object.entries(p.specs).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const featTags = p.feats.map(f => `<span class="ftag">${f}</span>`).join('');
  document.getElementById('pdetail-body').innerHTML = `
    <div class="hero">
      <div class="hero-em">${p.emoji}</div>
      <div class="hero-name">${p.name}</div>
      <div class="hero-price">${p.price}</div>
      <div class="hero-desc">${p.desc}</div>
    </div>
    <div class="acc open">
      <div class="acc-hd" onclick="toggleAcc(this)">✨ 主要特色 <span class="arr">▾</span></div>
      <div class="acc-body"><div class="ftags">${featTags}</div></div>
    </div>
    <div class="acc">
      <div class="acc-hd" onclick="toggleAcc(this)">📋 完整規格 <span class="arr">▾</span></div>
      <div class="acc-body"><table class="stbl"><tbody>${specRows}</tbody></table></div>
    </div>
    <div class="atc-wrap">
      <div class="atc-hint">將此產品加入規格比較</div>
      <button class="atc-btn" onclick="addAndGoCompare('${p.id}')">+ 加入比較</button>
    </div>`;
}

function backToList() {
  document.getElementById('pl-wrap').style.display = '';
  document.getElementById('pdetail').classList.remove('active');
}

function addAndGoCompare(id) {
  if (!selProds.includes(id) && selProds.length < 3) selProds.push(id);
  gotoSec('specs', document.querySelectorAll('.bnav-item')[3]);
}

/* ===================== FEATURES ===================== */
function setFcat(c, el) {
  fCat = c;
  document.querySelectorAll('#fcats .chip').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderFeats();
}
function renderFeats() {
  const body = document.getElementById('feat-body');
  const list = FEATURES.filter(f => fCat === 'all' || f.cat === fCat);
  if (!list.length) { body.innerHTML = '<p class="nores">暫無此分類功能</p>'; return; }
  body.innerHTML = list.map(f => `
    <div class="acc open" style="margin-bottom:10px;">
      <div class="acc-hd feat-hd-wrap" onclick="toggleAcc(this)">
        <div><div>${f.title}</div><div class="feat-sub">${f.sub}</div></div>
        <span class="arr">▾</span>
      </div>
      <div class="acc-body" style="display:block;">
        <p style="margin-bottom:12px;font-size:13px;">${f.desc}</p>
        ${f.items.map(i => `
          <div class="feat-item">
            <div class="feat-item-name">▸ ${i.n}</div>
            <div class="feat-item-desc">${i.d}</div>
          </div>`).join('')}
        <div class="dev-badges" style="margin-top:10px;">
          ${f.devices.map(d => `<span class="dbadge">📱 ${d}</span>`).join('')}
        </div>
      </div>
    </div>`).join('');
}

/* ===================== TROUBLESHOOTING ===================== */
function renderTrouble(q = '') {
  const body = document.getElementById('trouble-body');
  const q2 = q.toLowerCase();
  const list = TROUBLES.filter(t => !q2 || t.title.toLowerCase().includes(q2) || t.prod.toLowerCase().includes(q2));
  if (!list.length) { body.innerHTML = '<p class="nores">找不到相關問題 😕</p>'; return; }
  const groups = {};
  list.forEach(t => { (groups[t.prod] = groups[t.prod] || []).push(t); });
  body.innerHTML = Object.entries(groups).map(([prod, items]) => `
    <div style="margin-bottom:6px;">
      <div class="tcat-label">📱 ${prod}</div>
      ${items.map(t => `
        <div class="acc" style="margin-bottom:8px;">
          <div class="acc-hd" onclick="toggleAcc(this)">
            <span>${t.emoji} ${t.title}</span>
            <span class="arr">▾</span>
          </div>
          <div class="acc-body">
            <ol class="steps">${t.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
        </div>`).join('')}
    </div>`).join('');
}
function filterT() { renderTrouble(document.getElementById('tsearch').value); }

/* ===================== COMPARE / SPECS ===================== */
function renderCompareUI() {
  // chips
  const cc = document.getElementById('cchips');
  cc.innerHTML = PRODUCTS.map(p =>
    `<div class="cchip ${selProds.includes(p.id)?'selected':''}" onclick="toggleSel('${p.id}',this)">${p.emoji} ${p.name}</div>`
  ).join('');
  updateCmpBtn();
  renderSpecsAll();
}

function toggleSel(id, el) {
  if (selProds.includes(id)) {
    selProds = selProds.filter(x => x !== id);
    el.classList.remove('selected');
  } else {
    if (selProds.length >= 3) { alert('最多選擇 3 個產品比較！'); return; }
    selProds.push(id);
    el.classList.add('selected');
  }
  updateCmpBtn();
  document.getElementById('cresult').classList.remove('show');
}

function updateCmpBtn() {
  const btn = document.getElementById('cmp-btn');
  const n = selProds.length;
  btn.disabled = n < 2;
  btn.textContent = n < 2 ? (n === 0 ? '請先選擇產品' : '再選一個產品') : `比較 ${n} 個產品 →`;
}

function runCompare() {
  if (selProds.length < 2) return;
  const sel = selProds.map(id => PRODUCTS.find(p => p.id === id));
  const keys = [...new Set(sel.flatMap(p => Object.keys(p.specs)))];
  const th = `<tr><th>規格</th>${sel.map(p=>`<th><span class="ctbl-em">${p.emoji}</span>${p.name}</th>`).join('')}</tr>`;
  const rows = keys.map(k =>
    `<tr><td>${k}</td>${sel.map(p=>`<td>${p.specs[k]||'—'}</td>`).join('')}</tr>`
  ).join('');
  document.getElementById('ctbl-body').innerHTML =
    `<div style="font-size:15px;font-weight:800;margin-bottom:10px;">比較結果</div>
     <div class="ctbl-wrap"><table class="ctbl"><thead>${th}</thead><tbody>${rows}</tbody></table></div>`;
  const el = document.getElementById('cresult');
  el.classList.add('show');
  el.scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderSpecsAll() {
  document.getElementById('specs-all').innerHTML =
    `<div style="font-size:15px;font-weight:700;color:var(--sub);margin-bottom:12px;">所有產品規格一覽</div>
    ${PRODUCTS.map(p => `
      <div class="acc" style="margin-bottom:8px;">
        <div class="acc-hd" onclick="toggleAcc(this)">
          <div style="display:flex;align-items:center;gap:9px;">
            <span>${p.emoji}</span>
            <div><div style="font-size:14px;">${p.name}</div><div style="font-size:11px;font-weight:400;color:var(--sub);">${p.price}</div></div>
          </div>
          <span class="arr">▾</span>
        </div>
        <div class="acc-body">
          <table class="stbl"><tbody>
            ${Object.entries(p.specs).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
          </tbody></table>
        </div>
      </div>`).join('')}`;
}

/* ===================== ACCORDION ===================== */
function toggleAcc(hd) {
  const acc = hd.closest('.acc');
  const body = acc.querySelector('.acc-body');
  if (acc.classList.toggle('open')) {
    body.style.display = 'block';
  } else {
    body.style.display = 'none';
  }
}

/* ===================== INIT ===================== */
renderProds();
</script>
</body>
</html>
